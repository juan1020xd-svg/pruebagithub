<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRUD Docentes</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Registro de Docentes</h1>

<div class="contenedor-formulario">

<div class="formulario">

<select id="tipoDoc">
<option value="CC">C.C</option>
<option value="CE">C.E</option>
<option value="TI">T.I</option>
<option value="NIUP">NIUP</option>
</select>

<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">

<input type="date" id="fecha">

<select id="nivel">
<option value="1">nivel de estudios</option>
<option value="Pregrado">Pregrado</option>
<option value="Maestria">Maestría</option>
<option value="Doctorado">Doctorado</option>
</select>

<select id="area">
<option value="1">area</option>
<option value="Matematicas">Matemáticas</option>
<option value="Ciencias">Ciencias</option>
<option value="Sistemas">Sistemas</option>
<option value="Veterinaria">Veterinaria</option>
<option value="Derecho">Derecho</option>
</select>

<select id="grado">
<option value="1">grado</option>
<option value="1">1° Semestre</option>
<option value="2">2° Semestre</option>
<option value="3">3° Semestre</option>
<option value="4">4° Semestre</option>
<option value="5">5° Semestre</option>
<option value="6">6° Semestre</option>
<option value="7">7° Semestre</option>
<option value="8">8° Semestre</option>
<option value="9">9° Semestre</option>
<option value="10">10° Semestre</option>
</select>

<input type="text" id="eps" placeholder="EPS">
<input type="number" id="salario" placeholder="Salario">

</div>

<div class="boton-centro">
<button onclick="agregarDocente()">Guardar</button>
</div>

</div>

<h2>Lista de Docentes</h2>

<table border="1">

<thead>
<tr>
<th>Documento</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Fecha</th>
<th>Nivel</th>
<th>Área</th>
<th>Grado</th>
<th>EPS</th>
<th>Salario</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaDocentes">

</tbody>

</table>

<script src="script.js"></script>

</body>
</html>
